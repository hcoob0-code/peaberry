<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피크베리 디자인 샘플</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f4f4; padding: 20px; }
        .phone-container { max-width: 375px; margin: 0 auto 40px; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid #333; }
        .theme-label { text-align: center; font-weight: bold; margin-bottom: 10px; color: #555; }
    </style>
</head>
<body>

    <p class="theme-label">1. 세련된 미니멀 (깨끗한 화이트)</p>
    <div class="phone-container">
        <div class="p-6 border-b border-gray-100">
            <h1 class="text-2xl font-bold text-red-500">PickBerry</h1>
            <p class="text-xs text-gray-400">농장 경영 지원 시스템</p>
        </div>
        <div class="p-4 grid grid-cols-2 gap-3">
            <div class="p-4 bg-gray-50 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase">Income</p>
                <p class="text-lg font-bold text-emerald-600">₩ 1,250,000</p>
            </div>
            <div class="p-4 bg-gray-50 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase">Expense</p>
                <p class="text-lg font-bold text-red-400">₩ 450,000</p>
            </div>
        </div>
        <div class="px-4 py-2"><div class="h-24 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200 flex items-center justify-center text-gray-300 text-sm">내역 리스트 영역</div></div>
        <div class="h-16"></div>
    </div>

    <p class="theme-label">2. 생동감 넘치는 파스텔 (딸기 테마)</p>
    <div class="phone-container" style="background-color: #fff9f9;">
        <div class="p-8 bg-red-400 text-white rounded-b-[40px] text-center">
            <h1 class="text-xl font-bold">🍓 피크베리 농장</h1>
            <div class="mt-4 bg-white/20 py-2 px-4 rounded-full inline-block text-sm">2026년 4월 현황</div>
        </div>
        <div class="p-4 -mt-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-red-50" style="text-align: center;">
                <p class="text-sm text-gray-400 mb-1">이번 달 순이익</p>
                <p class="text-3xl font-black text-red-500">800,000원</p>
            </div>
        </div>
        <div class="p-4 space-y-3">
            <div class="flex items-center p-4 bg-white rounded-2xl shadow-sm">
                <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center mr-3">💰</div>
                <div><p class="text-sm font-bold">농협 출하</p><p class="text-xs text-gray-400">4월 28일</p></div>
                <div class="ml-auto text-emerald-500 font-bold">+50,000</div>
            </div>
        </div>
    </div>

    <p class="theme-label">3. 다크 모드 (고급스러운 대시보드)</p>
    <div class="phone-container" style="background-color: #121212; border-color: #222;">
        <div class="p-6 bg-[#1e1e1e]">
            <div class="flex justify-between items-center">
                <h1 class="text-lg font-bold text-white">Dashboard</h1>
                <div class="w-8 h-8 bg-red-500 rounded-full"></div>
            </div>
        </div>
        <div class="p-4 space-y-4">
            <div class="p-6 bg-[#1e1e1e] rounded-3xl border border-white/5">
                <p class="text-gray-500 text-xs mb-2">Total Balance</p>
                <p class="text-4xl font-light text-white">₩2,400,000</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="p-4 bg-[#252525] rounded-2xl text-center">
                    <p class="text-emerald-400 font-bold text-xl">↑ 12%</p>
                    <p class="text-[10px] text-gray-500">매출 성장</p>
                </div>
                <div class="p-4 bg-[#252525] rounded-2xl text-center">
                    <p class="text-red-400 font-bold text-xl">↓ 5%</p>
                    <p class="text-[10px] text-gray-500">비용 절감</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
