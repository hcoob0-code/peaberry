<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>피크베리 농장 - 수입·지출 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .safe-area-top { padding-top: env(safe-area-inset-top); }
        .active-tab { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div class="bg-[#d6554d] text-white p-6 pb-8 rounded-b-[30px] shadow-lg text-center safe-area-top">
        <h1 class="text-2xl font-bold mb-1">🍓 피크베리 농장</h1>
        <p class="text-sm opacity-90">수입·지출 관리</p>
    </div>

    <div class="flex justify-between items-center px-6 py-4">
        <button class="p-2 border rounded-xl bg-white shadow-sm">&lt;</button>
        <div class="text-center">
            <h2 class="text-xl font-bold">2026년 5월</h2>
            <p class="text-xs text-gray-500">월간 보기</p>
        </div>
        <button class="p-2 border rounded-xl bg-white shadow-sm">&gt;</button>
    </div>

    <div class="flex border-b bg-white sticky top-0 z-10">
        <button class="flex-1 py-3 text-sm font-medium active-tab">요약</button>
        <button class="flex-1 py-3 text-sm font-medium text-gray-500">수입</button>
        <button class="flex-1 py-3 text-sm font-medium text-gray-500">지출</button>
        <button class="flex-1 py-3 text-sm font-medium text-gray-500">딸기시세</button>
        <button class="flex-1 py-3 text-sm font-medium text-gray-500">대출</button>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">총 수입</p>
            <p class="text-xl font-bold text-emerald-600">0원</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">총 지출</p>
            <p class="text-xl font-bold text-red-500">0원</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">순이익</p>
            <p class="text-xl font-bold text-lime-600">0원</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <p class="text-xs text-gray-500 mb-1">대출잔액</p>
            <p class="text-xl font-bold">미설정</p>
        </div>
    </div>

    <div class="px-4 pb-20">
        <div class="mb-6">
            <h3 class="font-bold mb-2 text-gray-600 px-1">수입 항목별</h3>
            <div class="bg-white rounded-2xl p-4 text-center text-gray-400 text-sm shadow-sm">
                내역 없음
            </div>
        </div>
        <div>
            <h3 class="font-bold mb-2 text-gray-600 px-1">지출 항목별</h3>
            <div class="bg-white rounded-2xl p-4 text-center text-gray-400 text-sm shadow-sm">
                내역 없음
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6">
        <button class="w-14 h-14 bg-[#d6554d] text-white rounded-full shadow-2xl flex items-center justify-center text-3xl font-light">+</button>
    </div>
</body>
</html>
