<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>피크베리 농장</title>
    <style>
        /* 기존 스타일 유지 및 한글 폰트 최적화 */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root {
            --red: #E24B4A; --red-l: #FCEBEB; --green: #639922; --green-l: #EAF3DE;
            --teal: #1D9E75; --teal-l: #E1F5EE; --amber: #BA7517; --amber-l: #FAEEDA;
            --blue: #378ADD; --blue-l: #E6F1FB;
            --color-background-primary: #ffffff;
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #757575;
            --color-border-tertiary: #eeeeee;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif; 
            background-color: #f8f9fa;
            line-height: 1.5;
        }
        .app { max-width: 390px; margin: 0 auto; padding-bottom: 80px; min-height: 100vh; background: #fff; }
        .hdr { background: var(--red); color: #fff; padding: 16px 16px 12px; text-align: center; border-radius: 0 0 16px 16px; }
        .hdr h1 { font-size: 18px; font-weight: 600; }
        .hdr p { font-size: 11px; opacity: .9; margin-top: 2px; }
        
        .period-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-bottom: 1px solid var(--color-border-tertiary); }
        .period-bar button { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--color-text-secondary); }
        .plabel { font-size: 15px; font-weight: 600; }

        /* 탭 스타일 */
        .tabs { display: flex; overflow-x: auto; background: #fff; border-bottom: 1px solid var(--color-border-tertiary); sticky; top: 0; z-index: 10; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 1; min-width: 70px; padding: 12px 0; text-align: center; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

        /* 대시보드 카드 */
        .dash { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fdfdfd; padding: 12px; border-radius: 12px; border: 1px solid #f0f0f0; }
        .card .lab { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
        .card .val { font-size: 15px; font-weight: 700; }

        /* 버튼 및 기타 스타일 생략 (기존 파일 내용 유지) */
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: var(--red); color: #fff; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(226,75,74,0.3); border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app">
        <div class="hdr">
            <h1>🍓 피크베리 농장</h1>
            <p>수입 · 지출 관리 시스템</p>
        </div>

        <div class="period-bar">
            <button id="prev-period">&lt;</button>
            <div class="plabel" id="current-period">2026년 4월</div>
            <button id="next-period">&gt;</button>
        </div>

        <div class="tabs">
            <div class="tab active">요약</div>
            <div class="tab">수입</div>
            <div class="tab">지출</div>
            <div class="tab">딸기시세</div>
            <div class="tab">대출</div>
        </div>

        <div class="dash">
            <div class="card">
                <div class="lab">총 수입</div>
                <div class="val" style="color:var(--teal);">0원</div>
            </div>
            <div class="card">
                <div class="lab">총 지출</div>
                <div class="val" style="color:var(--red);">0원</div>
            </div>
            <div class="card">
                <div class="lab">순이익</div>
                <div class="val" style="color:var(--green);">0원</div>
            </div>
            <div class="card">
                <div class="lab">대출 잔액</div>
                <div class="val">미설정</div>
            </div>
        </div>

        <div style="padding: 0 16px;">
            <p style="text-align: center; color: #999; font-size: 13px; margin-top: 40px;">내역이 없습니다.</p>
        </div>

        <button class="fab">+</button>
    </div>

    <script>
        // 날짜 제어 스크립트
        let currentDate = new Date(2026, 3); // 2026년 4월
        const label = document.getElementById('current-period');

        function updateLabel() {
            label.innerText = `${currentDate.getFullYear()}년 ${currentDate.getMonth() + 1}월`;
        }

        document.getElementById('prev-period').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            updateLabel();
        };

        document.getElementById('next-period').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            updateLabel();
        };

        // 탭 전환 스크립트
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            };
        });
    </script>
</body>
</html>
